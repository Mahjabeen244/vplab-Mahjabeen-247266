<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certo Software | Mobile Privacy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg py-3 sticky-top bg-white">
    <div class="container">
      <a class="navbar-brand" href="#">
        <img src="images/logo.svg.png" alt="Certo Logo" height="40">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link mx-2" href="#">iPhone</a></li>
          <li class="nav-item"><a class="nav-link mx-2" href="#">Android</a></li>
          <li class="nav-item"><a class="nav-link mx-2" href="#">Help</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle mx-2" href="#" role="button" data-bs-toggle="dropdown">Company</a>
            <ul class="dropdown-menu"></ul>
          </li>
          <li class="nav-item ms-lg-3">
            <a class="btn btn-primary-certo" href="#">Sign In</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO: just two images stacked -->
  <section class="hero-section">
    <div class="hero-inner">
      <!-- div copy.png = blue/yellow box background, goes behind -->
      <img src="images/div copy.png" alt="Background" class="hero-bg">
      <!-- div.png = full content image (text + phone), goes on top -->
      <img src="images/div.png" alt="Hero Content" class="hero-content">
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
